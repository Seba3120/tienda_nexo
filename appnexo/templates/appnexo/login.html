<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ingresar - Tienda Nexo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🔒 Tienda Nexo</a>
            <div class="d-flex gap-3 align-items-center">
                <a href="{% url 'inicio' %}" class="nav-link">Inicio</a>
                <a href="{% url 'categorias' %}" class="nav-link">Categorías</a>
                <a href="#" class="nav-link">Promociones</a>
                <a href="#" class="nav-link">Contacto</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">

            <!-- Login -->
            <div class="col-md-6 border-end">
                <h3 class="fw-bold text-center mb-2">Iniciar Sesión</h3>
                <p class="text-center text-muted mb-4">Accede a tu cuenta existente.</p>

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-danger">{{ message }}</div>
                    {% endfor %}
                {% endif %}

                <form method="POST" action="{% url 'login' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" name="username" class="form-control" placeholder="tu.email@ejemplo.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control" placeholder="........" required>
                    </div>
                    <div class="text-end mb-3">
                        <a href="#" class="text-primary small">Olvidé mi contraseña</a>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Ingresar</button>
                </form>
            </div>

            <!-- Registro -->
            <div class="col-md-6">
                <h3 class="fw-bold text-center mb-2">Crear Cuenta</h3>
                <p class="text-center text-muted mb-4">Regístrate para una nueva experiencia.</p>

                <form method="POST" action="{% url 'registro' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" name="nombre" class="form-control" placeholder="Tu Nombre Completo" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" name="email" class="form-control" placeholder="tu.email@ejemplo.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control" placeholder="Crea una contraseña segura" required>
                    </div>
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" required>
                            <label class="form-check-label small">Acepto los términos y condiciones</label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Registrarse</button>
                </form>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
